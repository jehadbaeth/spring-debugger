rules:

  # ────────────────────────────────────────────────
  # Section 1: Application Context and Startup Errors
  # ────────────────────────────────────────────────

  - id: "1.1"
    name: "ApplicationContextException"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      bannerDescriptionContains: "Unable to start web server"
    diagnosis: "The Spring application context failed to start and threw ApplicationContextException, which is only a wrapper: the real cause is the deepest 'Caused by' line further down the log, where the web server, a bean, or an auto-configuration actually failed."
    fix: "Scroll to the innermost 'Caused by' in the stack trace and diagnose that exception, not this one. The most common roots are a port conflict, a failed DataSource, or a bean that could not be created; once the deepest cause is fixed, this wrapper disappears."
    confidence: HIGH
    fixture: "fixtures/1.1-application-context-exception.log"
    status: DONE

  - id: "1.2"
    name: "BeanDefinitionStoreException"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      causedByClass: "BeanDefinitionStoreException"
    diagnosis: "Spring could not read or parse a bean definition source, typically a @Configuration class, a @PropertySource file, or an @Import/XML reference that points at something missing or malformed, so the definition phase fails and the context never finishes loading."
    fix: "Check the @Configuration classes, @Import, and @PropertySource declarations you edited most recently and confirm every referenced class and resource exists and is spelled correctly. The deepest 'Caused by' usually names the exact file or class that could not be parsed."
    confidence: HIGH
    fixture: "fixtures/1.2-bean-definition-store.log"
    status: DONE

  - id: "1.4"
    name: "BeanInstantiationException"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      causedByClass: "BeanInstantiationException"
      messageContains: "No default constructor found"
    diagnosis: "Spring located the bean's class but could not create an instance of it, either because it has no usable no-argument constructor or because its constructor threw while running; construction happens during context refresh, so this fails startup."
    fix: "Add a public no-arg constructor (for an entity or DTO with Lombok, @NoArgsConstructor), or move risky initialisation out of the constructor into a @PostConstruct method where the failure is easier to trace. Read the nested 'Caused by' to see whether it is a missing constructor or a thrown exception."
    confidence: HIGH
    fixture: "fixtures/1.4-bean-instantiation.log"
    status: DONE

  - id: "1.5"
    name: "BeanDefinitionOverrideException"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      causedByClass: "BeanDefinitionOverrideException"
      messageContains: "could not be registered"
    diagnosis: "Two different bean definitions are registered under the same bean name, which Spring Boot forbids by default since 2.1 to stop one bean silently shadowing another; this usually happens when a component is both component-scanned and declared as an @Bean, or two @Bean methods share a name."
    fix: "Give one of the beans a distinct name with @Bean(\"uniqueName\") or remove the duplicate definition. Do not set spring.main.allow-bean-definition-overriding=true except as a temporary diagnostic, because it hides the real conflict and lets an unintended bean win."
    confidence: HIGH
    fixture: "fixtures/1.5-bean-definition-override.log"
    status: DONE

  - id: "1.8"
    name: "Port already in use"
    phases: [STARTUP]
    taps: [RUN_CONSOLE]
    signals:
      bannerDescriptionContains: "Port"
      messageContains: "already in use"
    diagnosis: "Another process is already listening on port {{port}}, so the embedded web server cannot bind to it."
    fix: "Find the process holding port {{port}} with 'lsof -i :{{port}}' (macOS/Linux) or 'netstat -ano | findstr {{port}}' (Windows) and stop it, or run this app on a different port via server.port=<port> in application.properties or the SERVER_PORT environment variable."
    confidence: HIGH
    fixture: "fixtures/1.8-port-in-use.log"
    status: DONE

  - id: "1.9"
    name: "No active profile"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "No active profile set, falling back to default profiles"
    diagnosis: "No Spring profile is active, so the application runs on the default profile only: profile-specific files such as application-dev.yml and any @Profile-gated beans are not loaded. This is a warning rather than a failure, but it often explains missing configuration."
    fix: "Activate the intended profile with spring.profiles.active=<profile> in application.properties, the SPRING_PROFILES_ACTIVE environment variable, or -Dspring.profiles.active=<profile> as a JVM argument, and confirm the startup log lists it under 'The following profiles are active'."
    confidence: HIGH
    fixture: "fixtures/1.9-no-active-profile.log"
    status: DONE

  - id: "1.12"
    name: "Auto-configuration not applied"
    phases: [STARTUP]
    taps: [RUN_CONSOLE]
    signals:
      messageContains: "UserDetailsService bean"
    diagnosis: "A Spring Boot auto-configuration did not activate because a starter it is conditional on is missing from the classpath, so the beans it would have created (a DataSource, a security filter chain, and so on) are absent; the symptom is usually a missing bean or unexpected default behaviour rather than a hard error."
    fix: "Add the starter that provides the feature (for example spring-boot-starter-data-jpa, spring-boot-starter-web, or spring-boot-starter-security) and rebuild. Run with --debug to print the auto-configuration report and confirm the entry moves from 'Negative matches' to 'Positive matches'."
    confidence: MEDIUM
    fixture: "fixtures/1.12-autoconfiguration-missing.log"
    status: DONE

  - id: "1.13"
    name: "BeanCurrentlyInCreationException"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      causedByClass: "BeanCurrentlyInCreationException"
    diagnosis: "Spring detected a circular dependency during startup: two or more beans require each other through constructor injection, so none can be fully created first and Spring fails fast rather than resolving the cycle."
    fix: "Break the cycle by extracting the shared logic into a third bean that both depend on, or redesign so the dependency flows one way. As a temporary measure annotate one injection point with @Lazy, or set spring.main.allow-circular-references=true only while debugging; neither is a real fix."
    confidence: HIGH
    fixture: "fixtures/1.13-circular-dependency.log"
    status: DONE

  # ─────────────────────────────────────
  # Section 2: Dependency Injection Errors
  # ─────────────────────────────────────

  # Specific mapper case must be evaluated before the generic NoSuchBean rule (2.1):
  # both key on NoSuchBeanDefinitionException, but a mapper type ending in "Mapper"
  # gets the precise MapStruct diagnosis. PSI enrichment can later upgrade it to HIGH.
  - id: "13.4"
    name: "MapStruct mapper not a Spring bean"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      causedByClass: "NoSuchBeanDefinitionException"
      causedByMessage: "Mapper"
    diagnosis: "A @Mapper interface could not be injected because its generated implementation is not registered as a Spring bean; MapStruct only registers it when componentModel = \"spring\" is set on the @Mapper annotation, so without that the mapper is invisible to the context."
    fix: "Add componentModel = \"spring\" to the @Mapper annotation (@Mapper(componentModel = \"spring\")), then inject the mapper with constructor injection like any other bean, and rebuild so the processor regenerates the implementation."
    confidence: MEDIUM
    fixture: "fixtures/13.4-mapper-not-spring-bean.log"
    status: DONE

  - id: "2.1"
    name: "NoSuchBeanDefinitionException"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      # "bean of type" is the substring common to all real phrasings: the failure-analysis
      # banner ("required a bean of type"), the autowire message ("No qualifying bean of
      # type ... expected at least 1 bean"), and the bracketed legacy form. Keyed broadly so
      # a missing @Component in a @SpringBootTest gets this precise diagnosis instead of the
      # 1.10 umbrella. The mapper sub-case is handled by 13.4 just above.
      causedByClass: "NoSuchBeanDefinitionException"
      messageContains: "bean of type"
    diagnosis: "Spring cannot find a bean of type {{beanType}}; no class of that type is registered in the application context."
    fix: "Annotate the {{beanType}} class with @Component (or @Service / @Repository to match its role), or declare it as an @Bean in a @Configuration class, and confirm it lives inside the package tree scanned by your @SpringBootApplication class."
    confidence: HIGH
    fixture: "fixtures/2.1-no-such-bean.log"
    status: DONE

  # Found by running a real Spring Boot 3.2 app with a missing constructor-injected bean:
  # the failure analyzer prints this banner and SUPPRESSES the stack, so there is no
  # "Caused by: NoSuchBeanDefinitionException" for 2.1 to match. This banner-only rule catches
  # that very common startup case. Keyed on the Description text rather than a cause class.
  - id: "2.13"
    name: "Missing bean (failure-analysis banner)"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      bannerDescriptionContains: "required a bean of type"
    diagnosis: "Spring's failure analyzer reports that a required bean of type {{beanType}} could not be found, so an @Autowired constructor or field has no candidate and the context fails to start (the full stack is suppressed in favour of this banner)."
    fix: "Declare {{beanType}} as a bean: annotate its class with @Component/@Service/@Repository, or add an @Bean method in a @Configuration class, and ensure it sits inside the package tree scanned by your @SpringBootApplication class. The banner's Action line names the exact type to define."
    confidence: HIGH
    fixture: "fixtures/2.13-missing-bean-banner.log"
    status: DONE

  - id: "2.2"
    name: "NoUniqueBeanDefinitionException"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      # Keyed on the class alone: the real exception message is "expected single matching bean
      # but found N", while "required a single bean, but" is only the failure-analyzer banner.
      causedByClass: "NoUniqueBeanDefinitionException"
    diagnosis: "More than one bean matches the injected type {{beanType}}, so Spring cannot decide which one to wire and fails; this typically happens when two implementations of the same interface are both registered as beans."
    fix: "Mark the intended implementation @Primary, or disambiguate at the injection point with @Qualifier(\"beanName\") (the bean name defaults to the decapitalised class name). The error message lists the candidate bean names to choose from."
    confidence: HIGH
    fixture: "fixtures/2.2-no-unique-bean.log"
    status: DONE

  - id: "2.3"
    name: "UnsatisfiedDependencyException"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      causedByClass: "UnsatisfiedDependencyException"
    diagnosis: "A bean could not be wired because one of its dependencies could not be satisfied; UnsatisfiedDependencyException is a wrapper, and the nested 'Caused by' says whether the dependency is missing (NoSuchBeanDefinitionException) or ambiguous (NoUniqueBeanDefinitionException)."
    fix: "Read the nested 'Caused by': if a bean is missing, declare or component-scan it; if it is ambiguous, mark one @Primary or add @Qualifier. The failing bean and the dependency it needs are both named in the message."
    confidence: MEDIUM
    fixture: "fixtures/2.3-unsatisfied-dependency.log"
    status: DONE

  - id: "2.7"
    name: "Circular dependency"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "The dependencies of some of the beans in the application context form a cycle"
    diagnosis: "Beans in the application context depend on each other in a cycle (A needs B, B needs A, possibly through more beans), which Spring cannot resolve with constructor injection and reports via a failure-analysis banner that lists the cycle."
    fix: "Break the cycle by extracting the shared logic into a third bean, or invert one dependency so it flows one way. As a temporary workaround put @Lazy on one injection point or set spring.main.allow-circular-references=true while debugging; the banner shows the exact beans in the cycle to target."
    confidence: HIGH
    fixture: "fixtures/2.7-circular-dep.log"
    status: DONE

  # ──────────────────────────────────────────────
  # Section 3: Configuration and Properties Errors
  # ──────────────────────────────────────────────

  - id: "3.1"
    name: "Could not resolve placeholder"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      causedByClass: "IllegalArgumentException"
      messageContains: "Could not resolve placeholder"
    diagnosis: "A @Value annotation references the property '{{property}}', which is not defined in any active property source (application.properties/yml, profile files, environment variables, or command-line arguments)."
    fix: "Define {{property}} in application.properties or the active profile file, supply it as an environment variable or a -D JVM argument, or give the annotation a default with @Value(\"${{{property}}:defaultValue}\"); run with --debug to print which property sources are active."
    confidence: HIGH
    fixture: "fixtures/3.1-unresolved-placeholder.log"
    status: DONE

  - id: "3.4"
    name: "Property type conversion failure"
    phases: [STARTUP]
    taps: [RUN_CONSOLE]
    signals:
      messageContains: "Failed to bind properties"
    diagnosis: "A configuration property value could not be converted to the Java type the target field expects (for example a non-numeric string bound to an int, or a malformed Duration/DataSize/enum), so binding fails at startup; the failure-analysis banner names the property, the offending value, and the required type."
    fix: "Correct the value to match the type: Duration accepts forms like '5s', '200ms', or '1h'; DataSize accepts '10MB'; enums match case-insensitively by name; booleans must be true/false. Fix the property named in the banner in application.properties or the active profile file."
    confidence: HIGH
    fixture: "fixtures/3.4-type-conversion.log"
    status: DONE

  - id: "3.5"
    name: "YAML syntax error"
    phases: [STARTUP]
    taps: [RUN_CONSOLE]
    signals:
      causedByClass: "ScannerException"
    diagnosis: "An application YAML file has a syntax error and could not be parsed, so none of its properties are loaded and startup fails; the parser reports the line and column, and the usual causes are tabs used for indentation, misaligned keys, or an unquoted value containing a special character."
    fix: "Fix the indentation or syntax at the reported line using spaces only (never tabs), keep keys aligned consistently, and quote any value containing ':', '@', '{', or other special characters. Paste the file into a YAML validator if the offending line is not obvious."
    confidence: HIGH
    fixture: "fixtures/3.5-yaml-syntax.log"
    status: DONE

  # ────────────────────────────────────────────────────
  # Section 4: Data Access and JPA / Hibernate Errors
  # ────────────────────────────────────────────────────

  - id: "4.1"
    name: "Cannot determine embedded database driver"
    phases: [STARTUP]
    taps: [RUN_CONSOLE]
    signals:
      bannerDescriptionContains: "Cannot determine embedded database driver class"
    diagnosis: "The JPA/Hibernate starter is on the classpath but Spring Boot found no datasource URL and no embedded database (H2, HSQLDB, Derby), so it cannot auto-configure a DataSource and aborts startup. This usually means the connection properties are missing or a dev/test profile that supplies them is not active."
    fix: "For a real database set spring.datasource.url, spring.datasource.username, and spring.datasource.password plus the JDBC driver dependency. For local development or tests add an embedded database such as com.h2database:h2 to the classpath; if this module does not need a database, exclude DataSourceAutoConfiguration."
    confidence: HIGH
    fixture: "fixtures/4.1-no-embedded-db.log"
    status: DONE

  - id: "4.2"
    name: "Failed to configure DataSource"
    phases: [STARTUP]
    taps: [RUN_CONSOLE]
    signals:
      bannerDescriptionContains: "Failed to configure a DataSource"
    diagnosis: "Spring Boot tried to auto-configure a DataSource but spring.datasource.url is missing, so it cannot determine what to connect to and fails with a failure-analysis banner; the JPA/JDBC starter is present but unconfigured."
    fix: "Provide spring.datasource.url (and username, password, and driver-class-name if the driver cannot be inferred), or, if this module does not actually need a datasource, exclude it with @SpringBootApplication(exclude = DataSourceAutoConfiguration.class). Confirm the properties live in the active profile."
    confidence: HIGH
    fixture: "fixtures/4.2-no-datasource.log"
    status: DONE

  - id: "4.4"
    name: "HikariCP connection pool exhausted"
    phases: [RUNTIME]
    taps: [RUN_CONSOLE]
    signals:
      causedByClass: "SQLTransientConnectionException"
      messageContains: "Connection is not available, request timed out"
    diagnosis: "The HikariCP connection pool is exhausted: every connection is checked out and none was returned within connectionTimeout, so the request times out. This is almost always a connection leak (connections not closed) or a pool sized too small for the load, not a database outage."
    fix: "Turn on leak detection with spring.datasource.hikari.leak-detection-threshold=20000 to log the stack traces holding connections, and fix those paths to close/return connections (try-with-resources, or let Spring manage the transaction). Only after fixing leaks consider raising spring.datasource.hikari.maximum-pool-size."
    confidence: HIGH
    fixture: "fixtures/4.4-hikari-exhausted.log"
    status: DONE

  - id: "4.6"
    name: "Not a managed JPA type"
    phases: [STARTUP]
    taps: [RUN_CONSOLE]
    signals:
      causedByClass: "IllegalArgumentException"
      messageContains: "Not a managed type"
    diagnosis: "Hibernate does not recognise a class as a JPA entity, either because it is missing the @Entity annotation or because it lives outside the package tree Hibernate scans for entities, so the repository or query referencing it fails."
    fix: "Add @Entity and an @Id field to the class. If the entity is in a different package from your @SpringBootApplication, point Hibernate at it with @EntityScan(basePackages = \"com.example.domain\") on a @Configuration class; the exception message names the offending class."
    confidence: HIGH
    fixture: "fixtures/4.6-not-managed-type.log"
    status: DONE

  - id: "4.8"
    name: "LazyInitializationException"
    phases: [RUNTIME]
    taps: [RUN_CONSOLE]
    signals:
      causedByClass: "LazyInitializationException"
      messageContains: "could not initialize proxy - no Session"
    diagnosis: "A lazily-loaded JPA association was accessed after its Hibernate session/transaction had already closed, so Hibernate cannot initialise the proxy; this most often happens when an entity is serialised to JSON in the controller after the @Transactional service method returned."
    fix: "Load the association while the transaction is open using a JOIN FETCH query or an @EntityGraph, or convert the entity to a DTO inside the transaction so the controller never touches a lazy proxy. Avoid spring.jpa.open-in-view=true as a fix: it hides the boundary problem and hurts performance."
    confidence: HIGH
    fixture: "fixtures/4.8-lazy-init.log"
    status: DONE

  - id: "4.13"
    name: "DataIntegrityViolationException"
    phases: [RUNTIME]
    taps: [RUN_CONSOLE]
    signals:
      # Keyed on the wrapper text, not the deepest cause: in real logs the
      # deepest Caused by is the JDBC driver's constraint exception, while the
      # Spring DataIntegrityViolationException is the outer wrapper (NEW-003).
      messageContains: "DataIntegrityViolationException"
    diagnosis: "A database write violated a constraint (unique, not-null, foreign key, or check), so the transaction was rolled back; DataIntegrityViolationException is Spring's wrapper and the deepest 'Caused by' from the JDBC driver names the exact constraint and column."
    fix: "Read the deepest 'Caused by' for the constraint name, then validate or de-duplicate the input before persisting so the violation cannot occur. Map this exception in a @RestControllerAdvice to return a meaningful 4xx instead of a 500, and add an application-level check (for example a uniqueness query) for a friendlier message."
    confidence: HIGH
    fixture: "fixtures/4.13-constraint-violation.log"
    status: DONE

  - id: "4.14"
    name: "RedisConnectionFactory not configured"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      causedByClass: "IllegalStateException"
      causedByMessage: "RedisConnectionFactory is required"
    diagnosis: "A RedisTemplate or other Spring Data Redis bean is being created but no RedisConnectionFactory is configured, so there is nothing to connect to Redis with and the context fails; usually the Redis starter is missing or the connection properties are absent."
    fix: "Add spring-boot-starter-data-redis to the build and set spring.data.redis.host and spring.data.redis.port (and password if required), or define a LettuceConnectionFactory (or JedisConnectionFactory) @Bean explicitly. Confirm the properties live in the active profile."
    confidence: HIGH
    fixture: "fixtures/4.14-redis-connection-factory.log"
    status: DONE

  - id: "4.15"
    name: "Database connection refused"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      # The JDBC driver reports a refused TCP connection at startup. PostgreSQL's exact phrasing is
      # "Connection to <host:port> refused. Check that the hostname and port are correct ..."; this
      # phrase is specific enough to avoid the conditions-report noise in a real bootRun. The app
      # may continue with a degraded context (Hibernate logs it and retries), so this is not always
      # a hard APPLICATION FAILED TO START.
      messageContains: "refused. Check that the hostname and port"
    diagnosis: "The application cannot open a TCP connection to its database: the JDBC driver reports the connection was refused, which means nothing is listening on that host and port. This is almost always a database that is not running, a wrong host/port, or a firewall rather than an application bug, and Hibernate keeps retrying so the message repeats."
    fix: "Start the database (for local development this is usually the docker-compose stack) and confirm spring.datasource.url points at the right host:port; test it with 'nc -zv <host> <port>' or 'pg_isready -h <host> -p <port>'. In Docker/Kubernetes use the service name the app can actually resolve, not localhost, and open the port in any firewall or security group."
    confidence: HIGH
    fixture: "fixtures/4.15-db-connection-refused.log"
    status: DONE

  - id: "4.16"
    name: "Schema validation failed (entity/DB out of sync)"
    phases: [STARTUP, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      # Hibernate ddl-auto=validate compares the entities to the live schema at startup and aborts
      # with "Schema-validation: missing column [..] in table [..]" (or missing table / wrong type).
      # Matched on that phrase, not the deepest cause, since it is wrapped in BeanCreationException.
      messageContains: "Schema-validation:"
    diagnosis: "Hibernate validated your @Entity mappings against the database at startup and found a mismatch (a missing or renamed column, a missing table, or a changed type), so it aborted. This almost always means an entity was changed but the matching schema migration was not added, so the database is behind the code; the message names the exact table and column."
    fix: "Add the missing Liquibase changeset (or Flyway migration) that brings the schema in line with the entity change and run it so the column or table exists. If the database is meant to be authoritative, revert the entity change instead. As a temporary local unblock you can set spring.jpa.hibernate.ddl-auto=update, but commit a proper migration rather than relying on it."
    confidence: HIGH
    fixture: "fixtures/4.16-schema-validation.log"
    status: DONE

  - id: "4.17"
    name: "Column or table not found at runtime"
    phases: [RUNTIME]
    taps: [RUN_CONSOLE]
    signals:
      # A query referenced a column/table the DB does not have. DB-specific wording, so match any:
      # Hibernate's wrapper plus the PostgreSQL/MySQL/SQL Server phrasings for unknown column/table.
      messageContainsAny:
        - "SQLGrammarException"
        - "Unknown column"
        - "Invalid column name"
        - "Invalid object name"
        - "ERROR: column"
        - "ERROR: relation"
    diagnosis: "A SQL statement referenced a column or table that the database does not have, so the driver rejected it. The most common cause is an @Entity or @Column that was changed without a matching schema migration, so the database is out of sync with the code; it can also be a typo in a hand-written @Query. The message names the exact column or table."
    fix: "Compare the entity or query against the real table and add the missing Liquibase changeset (or Flyway migration) to create or rename the column/table, then run it. If the schema is correct, fix the @Column/@Table mapping or the query instead. Catching this at startup is easier: set spring.jpa.hibernate.ddl-auto=validate so a drift fails fast with a clear schema-validation message."
    confidence: MEDIUM
    fixture: "fixtures/4.17-column-not-found.log"
    status: DONE

  # ──────────────────────────────────────────
  # Section 5: Web, REST, and MVC Errors
  # ──────────────────────────────────────────

  - id: "5.1"
    name: "404 No handler found"
    phases: [RUNTIME]
    taps: [RUN_CONSOLE]
    signals:
      causedByClass: "NoHandlerFoundException"
    diagnosis: "No controller handler is mapped to the requested HTTP method and path, so Spring MVC raised NoHandlerFoundException (404). The controller may not be component-scanned, the path or method may not match the mapping, or a context-path prefix may be missing."
    fix: "Verify the exact path including any server.servlet.context-path and the HTTP method against the @GetMapping/@PostMapping value, and confirm the controller is a scanned @RestController/@Controller bean. Enable spring.mvc.throw-exception-if-no-handler-found=true so 404s surface as this exception during debugging."
    confidence: HIGH
    fixture: "fixtures/5.1-no-handler.log"
    status: DONE

  # Spring 6 / Boot 3.2+ phrasing: DispatcherServlet logs "No endpoint GET /path." and the
  # NoHandlerFoundException class name does not appear in the log, so 5.1 (keyed on the class)
  # misses it. Found by running a real Boot 3.2 app. Same 404 diagnosis.
  - id: "5.13"
    name: "404 No endpoint (Spring Boot 3.2+)"
    phases: [RUNTIME]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "No endpoint "
    diagnosis: "Spring MVC found no handler for the requested path and returned 404 (logged as 'No endpoint <method> <path>'). The controller may not be component-scanned, or the path or HTTP method may not match the mapping."
    fix: "Check the exact path (including any server.servlet.context-path) and HTTP method against the controller's @GetMapping/@PostMapping, and confirm the controller is a scanned @RestController/@Controller bean."
    confidence: HIGH
    fixture: "fixtures/5.13-no-endpoint.log"
    status: DONE

  - id: "5.5"
    name: "MethodArgumentNotValidException"
    phases: [RUNTIME]
    taps: [RUN_CONSOLE]
    signals:
      # Keyed on the wrapper text: validation failures are logged as
      # "Resolved [...MethodArgumentNotValidException: ...]" with no Caused by
      # chain, so the class name appears in the body, not as a deepest cause.
      messageContains: "MethodArgumentNotValidException"
    diagnosis: "Bean Validation (@Valid) rejected the request body because one or more field constraints failed, so Spring raised MethodArgumentNotValidException and returned 400; this is validation working as designed, and the message lists the rejected fields and the constraints they violated."
    fix: "Handle it in a @RestControllerAdvice with @ExceptionHandler(MethodArgumentNotValidException.class), reading getBindingResult().getFieldErrors() to build a clean, structured 400 payload. Fix the offending request data, or adjust the constraint annotations on the DTO if the rule itself is wrong."
    confidence: HIGH
    fixture: "fixtures/5.5-validation-failure.log"
    status: DONE

  - id: "5.8"
    name: "Ambiguous handler mapping"
    phases: [STARTUP]
    taps: [RUN_CONSOLE]
    signals:
      messageContains: "Ambiguous mapping. Cannot map"
    diagnosis: "Two controller methods are mapped to the same HTTP method and path, so Spring cannot decide which should handle a request and fails at startup with an ambiguous-mapping error; this often happens after copy-pasting a handler or merging branches."
    fix: "Make the mappings unique by changing the path, the HTTP method, or by adding distinguishing conditions (params, headers, consumes, or produces) to one @RequestMapping. The error message names both conflicting methods so you can pick which to change."
    confidence: HIGH
    fixture: "fixtures/5.8-ambiguous-mapping.log"
    status: DONE

  # ─────────────────────────────────────────
  # Section 6: Spring Security Errors
  # ─────────────────────────────────────────

  - id: "6.2"
    name: "Default generated security password"
    phases: [STARTUP]
    taps: [RUN_CONSOLE]
    signals:
      messageContains: "Using generated security password"
    diagnosis: "Spring Security is on the classpath with no custom configuration, so it auto-secures every endpoint with HTTP Basic and prints a random generated password at startup; every request now returns 401 until authenticated. This is the default lockdown, not an error."
    fix: "Define your own security: add a @Bean SecurityFilterChain that declares which paths are public and which require authentication, plus a real user store (a UserDetailsService, or an OAuth2/JWT resource server). For a quick local login use the printed password with username 'user', but never rely on the generated password in real environments."
    confidence: HIGH
    fixture: "fixtures/6.2-generated-password.log"
    status: DONE

  - id: "6.4"
    name: "WebSecurityConfigurerAdapter removed"
    phases: [COMPILE]
    taps: [BUILD_OUTPUT]
    signals:
      buildLineContains: "WebSecurityConfigurerAdapter"
    diagnosis: "The code extends WebSecurityConfigurerAdapter, which was removed in Spring Security 6 / Spring Boot 3, so it no longer compiles or loads; Spring Security moved to a component-based configuration model."
    fix: "Delete the adapter subclass and expose the equivalent beans instead: a @Bean SecurityFilterChain(HttpSecurity) for request authorization, a @Bean WebSecurityCustomizer to ignore static resources, and a @Bean UserDetailsService or AuthenticationManager for the user store. The Spring Security migration guide maps each overridden method to its bean."
    confidence: HIGH
    fixture: "fixtures/6.4-web-security-configurer.log"
    status: DONE

  - id: "6.5"
    name: "No PasswordEncoder mapped"
    phases: [RUNTIME]
    taps: [RUN_CONSOLE]
    signals:
      messageContains: "There is no PasswordEncoder mapped for the id"
    diagnosis: "A stored password has no {id} encoding prefix (such as {bcrypt}), so Spring Security's default DelegatingPasswordEncoder cannot tell which algorithm to verify it with and throws 'There is no PasswordEncoder mapped for the id'; this usually means passwords were saved in plain text or with an unprefixed hash."
    fix: "Encode passwords with BCryptPasswordEncoder (or another PasswordEncoder) before storing them so they are saved with the correct {bcrypt} prefix, and re-encode existing rows. If you must read legacy unprefixed hashes, configure the matching encoder explicitly rather than storing plaintext."
    confidence: HIGH
    fixture: "fixtures/6.5-password-encoder.log"
    status: DONE

  # ──────────────────────────────────────────
  # Section 7: Serialization / Jackson Errors
  # ──────────────────────────────────────────

  - id: "7.2"
    name: "Infinite recursion on bidirectional JPA relationship"
    phases: [RUNTIME]
    taps: [RUN_CONSOLE]
    signals:
      # Keyed on the message, not StackOverflowError: in the common web case Jackson reports
      # "Could not write JSON: Infinite recursion (StackOverflowError)" via
      # HttpMessageNotWritableException, so the StackOverflowError is not the deepest cause.
      messageContains: "Infinite recursion"
    diagnosis: "Jackson recursed infinitely while serialising a bidirectional relationship where each side references the other (for example Order has a Customer and Customer has a List<Order>), producing a StackOverflowError because serialisation never terminates."
    fix: "Break the cycle on one side: annotate the parent reference with @JsonManagedReference and the child back-reference with @JsonBackReference, or put @JsonIgnore on the side you do not need in the output. The cleanest long-term fix is to serialise DTOs instead of entities so the API shape is explicit."
    confidence: HIGH
    fixture: "fixtures/7.2-infinite-recursion.log"
    status: DONE

  - id: "7.4"
    name: "Cannot construct Jackson instance"
    phases: [RUNTIME]
    taps: [RUN_CONSOLE]
    signals:
      causedByClass: "InvalidDefinitionException"
      messageContains: "no Creators, like default constructor"
    diagnosis: "Jackson cannot deserialise the incoming JSON into the target type because that type has no default (no-arg) constructor and no @JsonCreator, so Jackson has no way to instantiate it; this commonly hits immutable classes and types like Page/PageImpl."
    fix: "Add a no-arg constructor, or annotate the intended constructor with @JsonCreator and each parameter with @JsonProperty(\"field\"). For Java records or third-party types, register the appropriate module (for example the parameter-names module) or deserialise into a concrete DTO you control."
    confidence: HIGH
    fixture: "fixtures/7.4-no-default-constructor.log"
    status: DONE

  # ─────────────────────────────────────────────────
  # Section 9: Testing Errors
  # ─────────────────────────────────────────────────

  # 9.1 (generic "Failed to load ApplicationContext in tests") was removed: it
  # duplicated rule 1.10 exactly and its causedByClass: IllegalStateException
  # signal could never match, because the extractor keeps the DEEPEST Caused by,
  # which in a context-load failure is always something more specific. Rule 1.10
  # (now the last-resort catch-all at the end of the catalog) covers this case.

  - id: "9.6"
    name: "Testcontainers Docker not available"
    phases: [TEST]
    taps: [TEST_CONSOLE]
    signals:
      messageContains: "Could not find a valid Docker environment"
    diagnosis: "Testcontainers could not find a running Docker environment, so it cannot start the containers the tests depend on and the test context fails; Docker is either not installed, not running, or not reachable from this process (common on CI runners without a Docker service)."
    fix: "Start Docker Desktop or the Docker daemon locally and confirm 'docker ps' works. In CI make sure the runner provides Docker (a docker service or docker-in-docker), set DOCKER_HOST if it listens on a non-default socket, and pin image tags so pulls do not fail on restricted networks."
    confidence: HIGH
    fixture: "fixtures/9.6-testcontainers-docker.log"
    status: DONE

  - id: "9.2"
    name: "@MockBean not replacing real bean"
    phases: [TEST]
    taps: [TEST_CONSOLE]
    signals:
      causedByClass: "UnnecessaryStubbingException"
    diagnosis: "Mockito's strict stubbing flagged a stub that was configured but never invoked, which usually means the code under test took a different path than expected, or the real Spring bean ran instead of the mock; the test fails even if the assertions would pass."
    fix: "Remove the unused stub, or mark a genuinely conditional one lenient(). If a mock is being bypassed in a Spring test, replace plain @Mock with @MockitoBean (Boot 3.4+) or @MockBean so the mock actually replaces the bean in the application context rather than sitting unused."
    confidence: MEDIUM
    fixture: "fixtures/9.2-mockbean-not-replacing.log"
    status: DONE

  # ──────────────────────────────────────────────────────────
  # Section 10: Build, Packaging, and Dependency Errors
  # ──────────────────────────────────────────────────────────

  - id: "10.1"
    name: "NoSuchMethodError / NoClassDefFoundError"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      causedByClass: "NoSuchMethodError"
    diagnosis: "Two versions of the same library are on the classpath and the wrong one loaded at runtime; it lacks a method or class your code (or another library) was compiled against, producing NoSuchMethodError/NoClassDefFoundError. This is a dependency conflict, not a code bug."
    fix: "Run 'mvn dependency:tree' or 'gradle dependencies' to find which dependencies pull in the conflicting versions, then exclude the unwanted transitive version and let the Spring Boot dependency BOM manage the correct one. Avoid pinning a library to a version the BOM does not expect."
    confidence: HIGH
    fixture: "fixtures/10.1-no-such-method.log"
    status: DONE

  - id: "10.5"
    name: "Lombok not generating code"
    phases: [COMPILE]
    taps: [BUILD_OUTPUT]
    signals:
      buildLineContains: "cannot find symbol"
    diagnosis: "Code that Lombok should generate (getters, setters, builders, constructors) is missing at compile time, so references to it fail with 'cannot find symbol'; annotation processing is disabled, Lombok is not on the annotation-processor path, or in the IDE the Lombok plugin is not installed."
    fix: "Enable annotation processing in IntelliJ (Settings > Build, Execution, Deployment > Compiler > Annotation Processors), install the Lombok plugin, and in the build declare Lombok in the annotationProcessor scope (Gradle) or annotationProcessorPaths (Maven), not just compileOnly. Rebuild after enabling."
    confidence: MEDIUM
    fixture: "fixtures/10.5-lombok-missing.log"
    status: DONE

  - id: "10.6"
    name: "Java version mismatch"
    phases: [STARTUP, COMPILE]
    taps: [RUN_CONSOLE, BUILD_OUTPUT]
    signals:
      causedByClass: "UnsupportedClassVersionError"
    diagnosis: "The classes were compiled targeting a newer Java bytecode version than the JRE/JDK running them, so the runtime rejects them with UnsupportedClassVersionError; the build JDK and the run/deploy JDK are out of step."
    fix: "Make the build target and runtime JDK match: set sourceCompatibility/targetCompatibility (Gradle) or maven.compiler.release / <java.version> (Maven) to a version the target supports, or upgrade the JDK on the run/deploy machine. Verify with 'java -version' where the app actually runs."
    confidence: HIGH
    fixture: "fixtures/10.6-java-version.log"
    status: DONE

  # ─────────────────────────────────────────────────────────────────────
  # Section 13: MapStruct Errors (Phase: COMPILE, STARTUP, RUNTIME)
  # ─────────────────────────────────────────────────────────────────────

  - id: "13.1"
    name: "Unmapped target properties"
    phases: [COMPILE]
    taps: [BUILD_OUTPUT]
    signals:
      buildLineContains: "Unmapped target property"
    diagnosis: "MapStruct found one or more properties on the target type with no corresponding source mapping; with unmappedTargetPolicy = ERROR this fails the build (otherwise it is a warning), because MapStruct will not silently leave those fields unset."
    fix: "Add an explicit @Mapping(source = \"...\", target = \"field\") for each unmapped property, or @Mapping(target = \"field\", ignore = true) if it should intentionally stay unset. The compiler message lists every unmapped target property by name."
    confidence: HIGH
    fixture: "fixtures/13.1-unmapped-target.log"
    status: DONE

  - id: "13.2"
    name: "Incompatible types in @Mapping"
    phases: [COMPILE]
    taps: [BUILD_OUTPUT]
    signals:
      buildLineContains: "Can't map property"
    diagnosis: "MapStruct cannot map a source property to a target property because their types are incompatible and it knows no built-in conversion or mapping method for that pair, so it fails the build rather than guessing."
    fix: "Provide the conversion: add a mapping method (or shared @Mapper) that converts between the two types and reference it with @Mapping(target = \"field\", qualifiedByName = \"...\"), or supply an expression/dateFormat/numberFormat where applicable. The message names the exact source and target properties."
    confidence: HIGH
    fixture: "fixtures/13.2-incompatible-types.log"
    status: DONE

  - id: "13.3"
    name: "MapStruct implementation class missing"
    phases: [COMPILE, STARTUP]
    taps: [BUILD_OUTPUT, RUN_CONSOLE]
    signals:
      buildLineContains: "MapperImpl"
    diagnosis: "The MapStruct annotation processor did not run, so the generated implementation class (XxxMapperImpl) was never produced: the symbol is missing at compile time, or at runtime no implementation bean exists. Annotation processing is off or the processor is not on the right classpath."
    fix: "Enable annotation processing and declare org.mapstruct:mapstruct-processor in the annotationProcessor scope (Gradle) or the maven-compiler-plugin annotationProcessorPaths (Maven), not compileOnly/implementation. If Lombok is also present, add lombok-mapstruct-binding so the two processors cooperate, then rebuild."
    confidence: MEDIUM
    fixture: "fixtures/13.3-mapperimpl-missing.log"
    status: DONE


  - id: "13.5"
    name: "MapStruct cannot implement abstract method"
    phases: [COMPILE]
    taps: [BUILD_OUTPUT]
    signals:
      buildLineContains: "No implementation type is registered for return type"
    diagnosis: "MapStruct cannot generate a mapping method because the return type is an abstract type or interface with no registered implementation it can instantiate, so it does not know what concrete class to create."
    fix: "Map to a concrete type, or tell MapStruct which implementation to use: for custom abstract types provide a mapping method that returns a concrete instance, and for partial mappings use @BeanMapping(ignoreByDefault = true) to map only the fields you can. Collections and maps are usually inferred automatically."
    confidence: HIGH
    fixture: "fixtures/13.5-no-impl-for-return-type.log"
    status: DONE

  - id: "13.6"
    name: "Missing @Mapper annotation"
    phases: [COMPILE]
    taps: [BUILD_OUTPUT]
    signals:
      buildLineContains: "Could not generate implementation"
    diagnosis: "An interface intended to be a MapStruct mapper is missing the @Mapper annotation (or it was imported from the wrong package), so MapStruct does not recognise it and generates no implementation."
    fix: "Add @Mapper from org.mapstruct to the interface and check the import is org.mapstruct.Mapper, not another library. If it must be a Spring bean, set componentModel = \"spring\" in the same annotation so the generated impl is registered for injection."
    confidence: HIGH
    fixture: "fixtures/13.6-missing-mapper-annotation.log"
    status: DONE

  # 13.7 (Lombok/MapStruct processor order) is intentionally absent from the rule engine.
  # Its signal "cannot find symbol" collides with rule 10.5. PSI enrichment is required
  # to distinguish the two: check whether @Mapper and @Getter are both present and the
  # annotationProcessor ordering. Implement in M8 (PSI enrichment layer).

  # 13.8 (MapStruct nullValuePropertyMappingStrategy leaves fields null) is intentionally
  # NOT a rule in this engine. It produces no exception and no distinctive log line: the
  # symptom is a silently-null field at runtime. A log-based engine cannot detect it without
  # false-positiving on every mapper. It belongs in a static-analysis inspection (PSI), not
  # here, and is documented as out of scope for the log classifier rather than left as a
  # permanent TODO that can never be satisfied from logs.

  # ──────────────────────────────────────────────────────────────────────
  # Section 14: Spring Kafka errors (Phase: STARTUP, RUNTIME, TEST)
  # Several Kafka failures share an exception class (SerializationException,
  # TimeoutException, ConfigException), so these rules key on a distinctive
  # message substring. Order matters: the trusted-packages rule (14.4) comes
  # before the general deserialization rule (14.5) because a trusted-packages
  # failure also contains "Error deserializing key/value".
  # ──────────────────────────────────────────────────────────────────────

  - id: "14.1"
    name: "Kafka broker not reachable"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      # Two real signatures: the consumer/producer WARN spam ("Connection to node -1 (...) could
      # not be established. Node may not be available.") and the producer metadata timeout. Match
      # either.
      messageContainsAny:
        - "could not be established"
        - "Failed to update metadata after"
    diagnosis: "The Kafka client cannot reach any broker: it repeatedly logs that the connection to the bootstrap broker (node -1) could not be established, so no consumer or producer can work. This is almost always a wrong address, a broker that is down, or a network/firewall block rather than an application bug."
    fix: "Confirm spring.kafka.bootstrap-servers points at a reachable host:port (e.g. broker:9092) and test it with 'nc -zv <host> <port>'. In Docker/Kubernetes/cloud, set the broker's advertised.listeners to an address the client can actually resolve (not an internal container name) and open the port in any firewall or security group; the client reconnects automatically once the broker is reachable."
    confidence: HIGH
    fixture: "fixtures/14.1-kafka-broker-unreachable.log"
    status: DONE

  - id: "14.2"
    name: "Kafka bootstrap-servers not configured"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      causedByClass: "ConfigException"
      messageContains: "bootstrap.servers"
    diagnosis: "The Kafka client configuration is missing the required 'bootstrap.servers' property, so the producer/consumer factory cannot be constructed and the application context fails to start. Common causes are an absent property, a typo such as 'bootstrap-server' (missing the trailing s), or the value living in a profile that is not active."
    fix: "Add spring.kafka.bootstrap-servers=<host>:<port> to application.properties or the active profile file. If you build custom ConsumerFactory/ProducerFactory beans, inject KafkaProperties and use kafkaProperties.buildConsumerProperties()/buildProducerProperties() so the value propagates, and watch for typos because Spring silently ignores unknown spring.kafka.* keys."
    confidence: HIGH
    fixture: "fixtures/14.2-kafka-missing-bootstrap.log"
    status: DONE

  - id: "14.3"
    name: "Kafka consumer group.id invalid or missing"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "InvalidGroupIdException"
    diagnosis: "A Kafka consumer is using group management or committing offsets without a valid group.id, so the broker rejects the join-group request and the listener stops. Newer Kafka clients no longer default the group id, so it must be set explicitly."
    fix: "Set spring.kafka.consumer.group-id=<your-group> in application.properties, or specify it on the listener with @KafkaListener(topics = \"...\", groupId = \"...\"). The group id must be a non-empty string and, when ACLs are enabled, must have Read permission on the group."
    confidence: HIGH
    fixture: "fixtures/14.3-kafka-invalid-group-id.log"
    status: DONE

  - id: "14.4"
    name: "Kafka JsonDeserializer trusted packages not configured"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "is not in the trusted packages"
    diagnosis: "Spring Kafka's JsonDeserializer read the target class name from the message's __TypeId__ header, but that class's package is not in the deserializer's trusted-packages allowlist, so it refuses to instantiate it (a deserialization security control). The deepest cause is an IllegalArgumentException naming the blocked class."
    fix: "Add the package to the allowlist: spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.* (comma-separated, wildcards allowed), or '*' to trust all (only for fully trusted producers). Alternatively stop sending type headers on the producer (spring.kafka.producer.properties.spring.json.add.type.headers=false) and set a fixed target type on the consumer with spring.kafka.consumer.properties.spring.json.value.default.type=com.example.MyEvent."
    confidence: HIGH
    fixture: "fixtures/14.4-kafka-trusted-packages.log"
    status: DONE

  - id: "14.5"
    name: "Kafka consumer deserialization failure (poison pill)"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "Error deserializing key/value for partition"
    diagnosis: "A consumed record could not be deserialized into the target type (a 'poison pill'): the configured deserializer threw while converting the raw bytes, usually because the producer used a different format or schema, or a malformed message is on the topic. Without an error-handling deserializer the consumer is stuck at that offset and cannot advance."
    fix: "Wrap the real deserializer with ErrorHandlingDeserializer so bad records are captured instead of blocking the consumer: spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer plus spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=<your real deserializer>. Then configure a DefaultErrorHandler with a DeadLetterPublishingRecoverer to route failures to a DLT topic, and confirm the producer and consumer agree on the serialization format."
    confidence: HIGH
    fixture: "fixtures/14.5-kafka-consumer-deserialization.log"
    status: DONE

  - id: "14.6"
    name: "Kafka producer serialization failure"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "Can't serialize data"
    diagnosis: "The Kafka producer failed to serialize the value before sending: the configured serializer threw, typically because the payload class lacks Jackson getters or a no-arg constructor, contains a non-serializable field, or jackson-databind is missing. KafkaTemplate.send therefore returns a failed future and the message is never published."
    fix: "Give the payload class a public no-arg constructor and standard getters/setters (or @JsonProperty annotations), and ensure com.fasterxml.jackson.core:jackson-databind is on the classpath. Configure spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer, and handle the returned future (or add a ProducerListener) so per-message serialization failures are logged and recovered."
    confidence: HIGH
    fixture: "fixtures/14.6-kafka-producer-serialization.log"
    status: DONE

  - id: "14.7"
    name: "Kafka topic does not exist"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "UNKNOWN_TOPIC_OR_PARTITION"
    diagnosis: "A consumer or producer references a topic that does not exist on the broker (auto-create is usually disabled in production), so metadata requests return UNKNOWN_TOPIC_OR_PARTITION. The listener starts but silently receives nothing, or sends fail, and the client retries indefinitely; a misspelled topic name is the most common cause."
    fix: "Verify the exact topic name with 'kafka-topics.sh --list --bootstrap-server <host>:<port>'. Create it with a @Bean NewTopic in a @Configuration class so Spring Kafka's KafkaAdmin provisions it on startup, and set spring.kafka.admin.fail-fast=true so a missing or unreachable topic fails startup loudly instead of failing silently."
    confidence: HIGH
    fixture: "fixtures/14.7-kafka-unknown-topic.log"
    status: DONE

  - id: "14.8"
    name: "Kafka consumer rebalance / commit failed (poll interval exceeded)"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "Commit cannot be completed since the group has already rebalanced"
    diagnosis: "The consumer took longer than max.poll.interval.ms (default 5 minutes) to process a batch between poll() calls, so the broker treated it as dead, rebalanced its partitions to another member, and then rejected its offset commit with CommitFailedException. Those records may be reprocessed by the new owner."
    fix: "Either speed up processing or allow more time: raise spring.kafka.consumer.properties.max.poll.interval.ms (e.g. 600000) and/or lower spring.kafka.consumer.max-poll-records (default 500) so each batch is smaller. For long or unpredictable work, hand records to a bounded executor and return from the listener quickly, and tune heartbeat.interval.ms/session.timeout.ms if heartbeat failures also appear."
    confidence: HIGH
    fixture: "fixtures/14.8-kafka-commit-failed.log"
    status: DONE

  - id: "14.9"
    name: "Kafka SASL authentication failure"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "SaslAuthenticationException"
    diagnosis: "The Kafka client failed SASL authentication during the connection handshake, so the broker closed the connection before any topic operation. Typical causes are wrong credentials, a mechanism mismatch (for example PLAINTEXT instead of PLAIN), or a malformed sasl.jaas.config string; this is not retriable."
    fix: "Check the spring.kafka.properties.sasl.jaas.config syntax (e.g. org.apache.kafka.common.security.plain.PlainLoginModule required username=\"u\" password=\"p\";) and make sure spring.kafka.properties.sasl.mechanism (PLAIN, SCRAM-SHA-256, ...) and spring.kafka.properties.security.protocol (SASL_SSL or SASL_PLAINTEXT) match the broker. Verify the same credentials work through the Kafka CLI with --command-config before retrying."
    confidence: HIGH
    fixture: "fixtures/14.9-kafka-sasl-auth.log"
    status: DONE

  - id: "14.10"
    name: "Kafka topic authorization failure"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "Not authorized to access topics"
    diagnosis: "Authentication succeeded but the authenticated principal lacks the ACL required for the topic (Read for consumers, Write for producers, Describe for admin), so the broker returns a topic authorization failure and the listener container stops as a fatal error by default."
    fix: "Grant the ACL, e.g. 'kafka-acls.sh --add --allow-principal User:<name> --operation Read --topic <topic> --bootstrap-server <host>:<port>' (use Write and Describe for producers, and also grant Read on the consumer group). In Spring Kafka set containerProperties.setAuthorizationExceptionRetryInterval(Duration.ofSeconds(10)) so transient ACL-propagation delays are retried instead of stopping the container."
    confidence: HIGH
    fixture: "fixtures/14.10-kafka-topic-authorization.log"
    status: DONE

  - id: "14.11"
    name: "Kafka offset out of range (no reset policy)"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "Offsets out of range with no configured reset policy"
    diagnosis: "The consumer's committed offset no longer exists on the broker (the log segments were deleted by retention while the consumer was offline) and auto.offset.reset is set to 'none', so the client throws OffsetOutOfRangeException instead of repositioning."
    fix: "Set spring.kafka.consumer.auto-offset-reset=earliest (replay from the start of what is retained) or latest (skip to the end, accepting data loss), depending on your needs. Avoid auto.offset.reset=none unless you handle the reset manually, and consider increasing the topic's retention.ms if consumers are regularly offline long enough to fall behind retention."
    confidence: HIGH
    fixture: "fixtures/14.11-kafka-offset-out-of-range.log"
    status: DONE

  - id: "14.12"
    name: "Kafka record too large"
    phases: [STARTUP, RUNTIME, TEST]
    taps: [RUN_CONSOLE, TEST_CONSOLE]
    signals:
      messageContains: "RecordTooLargeException"
