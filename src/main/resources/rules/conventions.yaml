# Code convention rules. Separate from spring-boot-rules.yaml (the log diagnoser): these are
# proactive, source-file checks surfaced as IntelliJ inspection highlights, not log diagnoses.
#
# Each rule selects a checkType implemented in com.springdebugger.convention.checks and is turned
# on or off with the `enabled` flag (the user can also override per rule in Settings).
#
# Schema:
#   id          unique key, used in tests and the settings UI
#   name        human label shown in the settings list
#   checkType   selects the implementation; must resolve in CheckRegistry or load fails
#   enabled     authored default on/off switch
#   severity    WARNING | WEAK_WARNING | ERROR (maps to IntelliJ highlight severity)
#   appliesTo   file types the rule runs against (by extension); empty means all
#   params      free-form map passed to the check; each checkType documents its own params
#   message     plain-language statement of the violation; {{method}} is interpolated
#   fix         plain-language fix; {{method}} is interpolated
#   status      DONE means active and validated (mirrors the diagnoser convention)

rules:

  - id: "JAVADOC_METHOD"
    name: "Javadoc required on methods"
    checkType: "javadocRequired"
    enabled: true
    severity: WARNING
    appliesTo: [java]
    params:
      visibilities: [public]   # only methods with these visibilities require Javadoc
      skipOverrides: true      # methods annotated @Override are exempt
      skipAccessors: true      # trivial getters and setters are exempt
    message: "Public method '{{method}}' is missing a Javadoc comment."
    fix: "Add a Javadoc comment above '{{method}}' describing what it does, its parameters, and its return value."
    status: DONE

  # ── Robot Framework integration test conventions (GMS SM / SensSched) ──────
  # Source: docs/robot-test-conventions.md. All four checks parse a single .robot suite file.

  - id: "ROBOT_METADATA_REQUIRED"
    name: "Robot suite must declare required Metadata"
    checkType: "robotMetadataRequired"
    enabled: true
    severity: WARNING
    appliesTo: [robot]
    params:
      requiredMetadata: ["Test ID", "Test Description", "Pass-Fail Criteria"]
    message: "Robot suite is missing the required '{{field}}' metadata in *** Settings ***."
    fix: "Add 'Metadata    {{field}}    <value>' to the *** Settings *** section so the test is traceable in the report."
    status: DONE

  - id: "ROBOT_TEST_ID_FORMAT"
    name: "Robot Test ID must match T-<Scope>-<NNNN>"
    checkType: "robotTestIdFormat"
    enabled: true
    severity: WARNING
    appliesTo: [robot]
    params:
      # Scope set confirmed by the team: RE, FG, CA (four digit number). The convention document's
      # examples (T-API-1909, T-ID-007) use other scopes/digits and are intentionally rejected.
      # The pattern is a param: adjust here if the scope set or digit count changes.
      idPattern: "T-(RE|FG|CA)-\\d{4}"
    message: "Test ID '{{value}}' does not match the required format T-<Scope>-<NNNN> (scope RE, FG, or CA)."
    fix: "Rename the Test ID to T-<Scope>-<four digit number>, for example T-FG-0004, unique within its scope."
    status: DONE

  - id: "ROBOT_TESTCASE_DOC"
    name: "Robot test case must have [Documentation]"
    checkType: "robotTestCaseDoc"
    enabled: true
    severity: WARNING
    appliesTo: [robot]
    message: "Test case '{{test}}' has no [Documentation]."
    fix: "Add a [Documentation] entry to '{{test}}' describing the step number, title, step description, and observation."
    status: DONE

  - id: "ROBOT_TESTCASE_TAGS"
    name: "Robot test case must have a requirement [Tags]"
    checkType: "robotTestCaseTags"
    enabled: true
    severity: WARNING
    appliesTo: [robot]
    params:
      requireRequirementTag: true
      requirementPattern: "REQ-.+"
    message: "Test case '{{test}}' has no [Tags] linking it to a requirement (REQ-...)."
    fix: "Add [Tags] to '{{test}}' including the requirement id, for example: [Tags]    REQ-XYZ-123."
    status: DONE

  # ── Spring Boot conventions (GMS Service Modules) ──────────────────────────
  # Source: docs/spring-boot-conventions.md. These are team preferences, not hard rules, so they
  # default to WEAK_WARNING (a hint, not a warning) and can be disabled per team in Settings. Each
  # message is phrased as a suggestion, not a mandate.

  - id: "FIELD_INJECTION_FORBIDDEN"
    name: "Prefer constructor injection over field injection"
    checkType: "fieldInjectionForbidden"
    enabled: true
    severity: WEAK_WARNING
    appliesTo: [java]
    params:
      annotations: ["Autowired", "Inject"]
    message: "Field '{{field}}' is injected directly; constructor injection is preferred."
    fix: "Move '{{field}}' into a constructor parameter so it is injected via the constructor instead."
    status: DONE

  - id: "NO_SYSTEM_OUT_ERR"
    name: "Prefer a logger over System.out / System.err"
    checkType: "noSystemOutErr"
    enabled: true
    severity: WEAK_WARNING
    appliesTo: [java]
    message: "System.{{member}} is used here; a logger is preferred over console output."
    fix: "Replace System.{{member}} with the appropriate logger call, e.g. log.debug(...)."
    status: DONE

  - id: "OPTIONAL_AS_PARAMETER"
    name: "Avoid Optional as a method parameter"
    checkType: "optionalUsage"
    enabled: true
    severity: WEAK_WARNING
    appliesTo: [java]
    params:
      target: "parameter"
    message: "Parameter '{{name}}' is typed as Optional; Optional parameters are best avoided."
    fix: "Consider an overload or a plain nullable/required parameter for '{{name}}' instead of Optional."
    status: DONE

  - id: "OPTIONAL_AS_FIELD"
    name: "Avoid Optional as a field type"
    checkType: "optionalUsage"
    enabled: true
    severity: WEAK_WARNING
    appliesTo: [java]
    params:
      target: "field"
    message: "Field '{{name}}' is typed as Optional; storing Optional in a field is best avoided."
    fix: "Consider a plain nullable field for '{{name}}' and reserve Optional for method return types."
    status: DONE

  - id: "TRANSACTIONAL_MISPLACED"
    name: "Keep @Transactional on service methods only"
    checkType: "transactionalMisplaced"
    enabled: true
    severity: WEAK_WARNING
    appliesTo: [java]
    params:
      transactionalAnnotations: ["Transactional"]
      excludedAnnotations: ["RestController", "Repository"]
    message: "'{{member}}' is annotated @Transactional but its class is a @{{marker}}; @Transactional is intended for service methods."
    fix: "Consider moving the transactional logic in '{{member}}' into a @Service method instead."
    status: DONE

  - id: "ENTITY_STRING_FIELD_BOUNDED"
    name: "Bound String fields on JPA entities"
    checkType: "entityStringFieldBounded"
    enabled: true
    severity: WEAK_WARNING
    appliesTo: [java]
    params:
      entityAnnotation: "Entity"
      boundingAnnotations: ["Size", "Column", "Convert"]
    message: "Entity field '{{field}}' is an unbounded String."
    fix: "Consider bounding '{{field}}' with @Size, a @Column(length=...), or an AttributeConverter."
    status: DONE

  - id: "REQUEST_BODY_REQUIRES_VALID"
    name: "Pair @RequestBody with @Valid"
    checkType: "requestBodyRequiresValid"
    enabled: true
    severity: WEAK_WARNING
    appliesTo: [java]
    params:
      bodyAnnotation: "RequestBody"
      validationAnnotations: ["Valid", "Validated"]
    message: "@RequestBody parameter '{{parameter}}' has no @Valid; its bean validation will not run."
    fix: "Consider adding @Valid next to @RequestBody on '{{parameter}}' to trigger DTO validation."
    status: DONE

  - id: "SERVICE_CLASS_NAMING"
    name: "Name @Service classes with a Service suffix"
    checkType: "serviceClassNaming"
    enabled: true
    severity: WEAK_WARNING
    appliesTo: [java]
    params:
      serviceAnnotation: "Service"
      suffix: "Service"
    message: "'{{class}}' is annotated @Service but its name does not end with '{{suffix}}'."
    fix: "Consider renaming '{{class}}' to end with '{{suffix}}' to match the team naming convention."
    status: DONE

  - id: "API_VERSION_PATH"
    name: "Version controller base paths (/api/vN/...)"
    checkType: "apiVersionPath"
    enabled: true
    severity: WEAK_WARNING
    appliesTo: [java]
    params:
      mappingAnnotations: ["RequestMapping"]
      pathPattern: "^/api/v\\d+(/.*)?$"
    message: "'{{class}}' maps to '{{path}}', which is not a versioned /api/vN/... path."
    fix: "Consider versioning the base path of '{{class}}', e.g. /api/v1{{path}}."
    status: DONE
