name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run unit tests
        run: ./gradlew test

      - name: Build plugin artifact
        run: ./gradlew buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: spring-debugger-plugin
          path: build/distributions/*.zip
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/test/
          retention-days: 7

  vscode-extension:
    name: VS Code Extension Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      # Runs the TypeScript engine against the SAME parity/golden.json the Java side asserts, so
      # any drift between the two engines fails CI here.
      - name: Run tests (incl. cross-engine parity)
        working-directory: vscode-extension
        run: npm test

      - name: Type check
        working-directory: vscode-extension
        run: npx tsc -p ./ --noEmit

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: spring-debugger-vscode
          path: vscode-extension/*.vsix
          retention-days: 30
